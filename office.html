function cellOf(px,py){return [Math.max(0,Math.min(COLS-1,Math.floor(px/CELL))),Math.max(0,Math.min(ROWS-1,Math.floor(py/CELL)))];}
function free(c,r,bnd){ if(c<0||r<0||c>=COLS||r>=ROWS)return false; if(blocked[r][c])return false;
 if(bnd){const px=c*CELL+CELL/2,py=r*CELL+CELL/2; if(px<bnd.x0||px>bnd.x1||py<bnd.y0||py>bnd.y1)return false;} return true;}
function astar(sc,sr,gc,gr,bnd){ if(!free(gc,gr,bnd)){return null;}
 const key=(c,r)=>r*COLS+c; const openS=[[sc,sr]]; const came={}; const gsc={}; gsc[key(sc,sr)]=0;
 const fsc={}; fsc[key(sc,sr)]=Math.abs(sc-gc)+Math.abs(sr-gr); const seen=new Set();
 let it=0;
 while(openS.length&&it++<4000){ let bi=0;for(let i=1;i<openS.length;i++){if((fsc[key(openS[i][0],openS[i][1])]||1e9)<(fsc[key(openS[bi][0],openS[bi][1])]||1e9))bi=i;}
  const [c,r]=openS.splice(bi,1)[0]; if(c===gc&&r===gr){const path=[[c,r]];let k=key(c,r);while(came[k]){const p=came[k];path.unshift(p);k=key(p[0],p[1]);}return path;}
  seen.add(key(c,r));
  for(const [dc,dr] of [[1,0],[-1,0],[0,1],[0,-1]]){const nc=c+dc,nr=r+dr;if(!free(nc,nr,bnd)||seen.has(key(nc,nr)))continue;
   const ng=gsc[key(c,r)]+1; if(ng<(gsc[key(nc,nr)]||1e9)){came[key(nc,nr)]=[c,r];gsc[key(nc,nr)]=ng;fsc[key(nc,nr)]=ng+Math.abs(nc-gc)+Math.abs(nr-gr);if(!openS.some(o=>o[0]===nc&&o[1]===nr))openS.push([nc,nr]);}}}
 return null;}
function randFreeCell(r){ const bnd={x0:r.x+16,x1:r.x+r.w-16,y0:r.y+26,y1:r.y+r.h-16};
 for(let i=0;i<40;i++){const px=bnd.x0+R()*(bnd.x1-bnd.x0),py=bnd.y0+R()*(bnd.y1-bnd.y0);const [c,rr]=cellOf(px,py);if(free(c,rr))return [c,rr];} 
 const [c,rr]=cellOf(r.doorX,(r.side==="top")?r.y+r.h-30:r.y+30);return [c,rr];}
function cc(c,r){return {x:c*CELL+CELL/2,y:r*CELL+CELL/2};}

function loop(now){const dt=Math.min(.05,(now-last)/1000);last=now;
 handleFire(dt); const anyBurning=fires.some(f=>f.state==="burning");
 for(const ch of chars){ch.t+=dt;
  if(ch.firefighter){ if(anyBurning){ mohitFight(ch,dt); if(ch.bubT>0)ch.bubT-=dt; continue; } else { ch.spraying=false; ch.target=null; } }
  if(ch.wait>0){ch.wait-=dt;ch.moving=false;}
  else if(ch.path.length===0){ if(ch.role==="roam"&&ch.nextRoom){ch.room=ch.nextRoom;ch.nextRoom=null;ch.wait=1+R()*3;} else {replan(ch); if(ch.role==="agent"||ch.role==="ceo"){} ch.wait=ch.path.length?0:0.4+R()*1.5;} }
  if(ch.path.length){const p=ch.path[0],dx=p.x-ch.x,dy=p.y-ch.y,d=Math.hypot(dx,dy);
   if(d<2){ch.path.shift();if(ch.path.length===0&&ch.role==="roam"){ch.wait=0;}}
   else{ch.moving=true;const sp=Math.min(d,(ch.role==="roam"?62:34)*(ch.name==="Judy"?2.5:1)*dt);ch.x+=dx/d*sp;ch.y+=dy/d*sp;if(Math.abs(dx)>.4)ch.dir=dx>0?1:-1;}}
  ch.cd-=dt;if(ch.cd<=0&&!ch.reporting){ch.cd=6+R()*10;ch.bub=ch.say[ri(ch.say.length)];ch.bubT=2.8;}if(ch.bubT>0)ch.bubT-=dt;
  if(ch.rfid){var _rm=null;for(const r of rooms){if(ch.x>=r.x&&ch.x<=r.x+r.w&&ch.y>=r.y&&ch.y<=r.y+r.h){_rm=r.s;break;}}if(ch._prevRoom===undefined)ch._prevRoom=_rm;if(ch._prevRoom&&_rm!==ch._prevRoom)ch.alarmT=6;ch._prevRoom=_rm;ch.alarmT=Math.max(0,(ch.alarmT||0)-dt);ch.alarm=ch.alarmT>0;}
  if(ch.pets){(ch.trail||(ch.trail=[])).push({x:ch.x,y:ch.y});if(ch.trail.length>240)ch.trail.shift();}
 }
 // render
 g.fillStyle="#aeb7c0";g.fillRect(0,0,W,H);

 for(const r of rooms) floorTiles(r);
 drawWalls();

 const draws=[]; for(const o of furn) draws.push({y:o.baseY,f:()=>drawFurn(o)}); for(const ch of chars) draws.push({y:ch.y,f:()=>drawChar(ch)});

 draws.sort((a,b)=>a.y-b.y); for(const d of draws) d.f();
 // title
 g.fillStyle="#0d1f2d";g.fillRect(0,0,W,TOP);g.fillStyle="#fff";g.font="bold 18px 'Segoe UI',Arial";g.textBaseline="middle";g.textAlign="left";g.fillText("🏢  CIH Headquarters",14,TOP/2);
 g.font="12px 'DM Mono',monospace";g.fillStyle="#8fb5d6";g.fillText("agents in-office · NIW + Simplicity roaming",214,TOP/2+1);
 const t=new Date();g.textAlign="right";g.fillStyle="#cfe0ee";g.font="13px 'DM Mono',monospace";g.fillText(t.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}),W-14,TOP/2);g.textAlign="left";
 if(fires.length){g.textAlign="right";g.fillStyle="#ffab2b";g.font="bold 12px 'Segoe UI',Arial";g.fillText("🔥 "+fires.length+" active — Mohit responding",W-96,TOP/2);g.textAlign="left";}
 requestAnimationFrame(loop);}
